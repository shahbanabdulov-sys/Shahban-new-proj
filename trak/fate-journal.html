<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник Судьбы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../site-nav.css">
    <style>
        /* Минимальные стили в духе текущего проекта (dark) */
        :root { --red:#ff4d4f; --orange:#fa8c16; --green:#10b981; }
        * { box-sizing: border-box; }
        body { font-family:'Inter', sans-serif; margin:0; background: radial-gradient(1000px 600px at 10% -10%, #1f2937 0%, #0b0e11 60%), radial-gradient(800px 500px at 110% 10%, #111827 0%, #0b0e11 70%); color:#e5e7eb; }
        .container { padding: 16px 20px; max-width: 1200px; margin: 0 auto; }
        .header { display:flex; align-items:center; gap:12px; padding:12px 16px; border:1px solid rgba(255,255,255,0.08); border-radius:12px; background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); margin-bottom:16px; }
        .title { font-weight:800; font-size:1.4rem; display:flex; align-items:center; gap:10px; }
        .title i { color:#60a5fa; }
        .header-actions { margin-left:auto; display:flex; gap:8px; }
        .btn { background: rgba(17,24,39,0.85); color:#93c5fd; border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:10px 12px; cursor:pointer; }
        .btn:hover { background: rgba(17,24,39,0.95); }
        .grid { display:grid; grid-template-columns: 300px 1fr; gap:16px; align-items:start; }
        .panel { background: rgba(17,24,39,0.7); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:12px; }
        .panel h3 { margin:0 0 10px; font-size:1rem; color:#93c5fd; }
        .field { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
        .input, textarea { background:#0b0e11; color:#e5e7eb; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px 12px; width:100%; }
        .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .color-chip { width:28px; height:28px; border-radius:8px; cursor:pointer; border:2px solid rgba(255,255,255,0.18); }
        .chip-red { background:#ff4d4f; }
        .chip-orange { background:#fa8c16; }
        .chip-green { background:#10b981; }
        .chip-selected { box-shadow:0 0 0 2px #fff inset; }
        .cards { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:12px; }
        .card { border-radius:12px; padding:10px; display:flex; flex-direction:column; gap:8px; border:1px solid rgba(255,255,255,0.08); }
        .card.red { background:#3b0d0d; box-shadow: inset 0 0 0 3px rgba(255,77,79,0.65); }
        .card.orange { background:#331c05; box-shadow: inset 0 0 0 3px rgba(250,140,22,0.65); }
        .card.green { background:#0b3327; box-shadow: inset 0 0 0 3px rgba(16,185,129,0.65); }
        .card-header { display:flex; gap:8px; align-items:center; }
        .card-title { font-weight:800; font-size:1.05rem; margin-bottom:4px; }
        .pill { border-radius:9999px; padding:4px 8px; font-size:.78rem; color:#0b0e11; font-weight:700; }
        .pill.red { background:#ff4d4f; }
        .pill.orange { background:#fa8c16; }
        .pill.green { background:#10b981; }
        .card-actions { display:flex; gap:6px; margin-left:auto; }
        .mini { padding:6px 8px; font-size:.85rem; }
        .subpoints { display:flex; flex-direction:column; gap:6px; }
        .subpoint { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:8px; display:flex; flex-direction:column; gap:8px; align-items:stretch; }
        .subpoint textarea { flex:1; min-height:60px; overflow:hidden; resize:none; }
        .score-input { width:90px; text-align:center; }
        .muted { color:#9ca3af; font-size:.85rem; }
        .note { background: rgba(17,24,39,0.7); border:1px dashed rgba(255,255,255,0.12); border-radius:10px; padding:10px; }
        .empty { text-align:center; color:#9ca3af; border:1px dashed rgba(255,255,255,0.12); border-radius:10px; padding:20px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        /* (details modal removed; now dedicated page) */
    </style>
    <link rel="stylesheet" href="theme.css?v=1">
</head>
<body class="site-page-trak">
    <nav class="site-switcher" aria-label="Site switcher">
        <a class="site-switcher__link" href="../index.html">Productiv Line</a>
        <a class="site-switcher__link" href="index.html" aria-current="page">Tracker</a>
    </nav>
    <div class="container">
        <div class="header">
            <div class="title"><i class="fas fa-book"></i> Дневник Судьбы</div>
            <div class="header-actions">
                <button class="btn" onclick="location.href='index.html'"><i class="fas fa-home"></i> На главную</button>
                <button id="exportBtn" class="btn"><i class="fas fa-download"></i> Экспорт</button>
                <button id="importBtn" class="btn"><i class="fas fa-upload"></i> Импорт</button>
                <input id="importFile" type="file" accept=".json" style="display:none;" />
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <h3><i class="fas fa-plus"></i> Новая запись</h3>
                <div class="field">
                    <label>Тема (грех, упущение, возможность...)</label>
                    <input id="entryTitle" class="input" placeholder="Например: Проспал" />
                </div>
                <div class="field">
                    <label>Цвет</label>
                    <div class="row">
                        <div class="color-chip chip-red chip-selected" data-color="red" title="Красный"></div>
                        <div class="color-chip chip-orange" data-color="orange" title="Оранжевый"></div>
                        <div class="color-chip chip-green" data-color="green" title="Зелёный"></div>
                    </div>
                </div>
                <div class="row">
                    <input id="entryScore" class="input score-input" type="number" step="0.1" placeholder="Оценка" />
                    <button id="addEntryBtn" class="btn"><i class="fas fa-plus"></i> Добавить</button>
                </div>
                
                <div class="field">
                    <h3><i class="fas fa-lightbulb"></i> Мои улучшения</h3>
                    <textarea id="improvements" placeholder="Что прибавил, что улучшил, над чем поработал..." class="note" rows="6"></textarea>
                    <div class="row" style="justify-content:flex-end;">
                        <button id="saveImprovementsBtn" class="btn mini"><i class="fas fa-save"></i> Сохранить заметку</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fas fa-list"></i> Записи</h3>
                <div id="entries" class="cards"></div>
                <div id="emptyState" class="empty" style="display:none;">Пока нет записей. Добавьте первую.</div>
            </div>
        </div>
    </div>

    

    <script>
    (function() {
        const STORAGE_KEY = 'fateJournal.entries.v1';
        const IMPROVEMENTS_KEY = 'fateJournal.improvements.v1';

        /** @type {Array<{id:string,title:string,color:'red'|'orange'|'green',score:number,createdAt:number,subpoints:Array<{id:string,label:string,text:string}>}>} */
        let state = load();

        const entriesEl = document.getElementById('entries');
        const emptyEl = document.getElementById('emptyState');
        const titleEl = document.getElementById('entryTitle');
        const scoreEl = document.getElementById('entryScore');
        const chips = Array.from(document.querySelectorAll('.color-chip'));
        let selectedColor = 'red';

        const improvementsEl = document.getElementById('improvements');
        improvementsEl.value = localStorage.getItem(IMPROVEMENTS_KEY) || '';

        // color chips handlers
        chips.forEach(ch => {
            ch.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('chip-selected'));
                ch.classList.add('chip-selected');
                selectedColor = ch.getAttribute('data-color');
            });
        });

        document.getElementById('addEntryBtn').addEventListener('click', () => {
            const title = (titleEl.value || '').trim();
            const score = parseFloat(scoreEl.value || '0') || 0;
            if(!title) { titleEl.focus(); return; }
            addEntry(title, selectedColor, score);
            titleEl.value = '';
            scoreEl.value = '';
        });

        document.getElementById('saveImprovementsBtn').addEventListener('click', () => {
            localStorage.setItem(IMPROVEMENTS_KEY, improvementsEl.value || '');
        });

        // Export/Import
        document.getElementById('exportBtn').addEventListener('click', () => {
            const payload = { entries: state, improvements: improvementsEl.value || '' };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'fate-journal.json'; a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    if(Array.isArray(data.entries)) { state = data.entries; save(); }
                    if(typeof data.improvements === 'string') { improvementsEl.value = data.improvements; localStorage.setItem(IMPROVEMENTS_KEY, data.improvements); }
                    render();
                } catch(err) { console.error(err); }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // Navigate to dedicated details page

        // CRUD
        function addEntry(title, color, score) {
            const entry = { id: cryptoRandomId(), title, color, score, createdAt: Date.now(), subpoints: defaultSubpoints() };
            state.unshift(entry);
            save();
            render();
        }

        function updateEntry(id, patch) {
            const idx = state.findIndex(e => e.id === id);
            if(idx === -1) return;
            state[idx] = { ...state[idx], ...patch };
            save();
            render();
        }

        function removeEntry(id) {
            state = state.filter(e => e.id !== id);
            save();
            render();
        }

        function addSubpoint(entryId, label, text='') {
            const item = state.find(e => e.id === entryId);
            if(!item) return;
            item.subpoints.push({ id: cryptoRandomId(), label, text });
            save();
            render();
        }

        function updateSubpoint(entryId, subId, patch) {
            const item = state.find(e => e.id === entryId);
            if(!item) return;
            const sp = item.subpoints.find(s => s.id === subId);
            if(!sp) return;
            Object.assign(sp, patch);
            save();
        }

        function removeSubpoint(entryId, subId) {
            const item = state.find(e => e.id === entryId);
            if(!item) return;
            item.subpoints = item.subpoints.filter(s => s.id !== subId);
            save();
            render();
        }

        function render() {
            entriesEl.innerHTML = '';
            if(state.length === 0) { emptyEl.style.display = 'block'; return; } else { emptyEl.style.display = 'none'; }
            for(const e of state) entriesEl.appendChild(renderCard(e));
        }

        function renderCard(e) {
            const card = document.createElement('div');
            card.className = 'card ' + (e.color === 'red' ? 'red' : e.color === 'green' ? 'green' : 'orange');

            const titleDisplay = document.createElement('div');
            titleDisplay.className = 'card-title';
            titleDisplay.textContent = e.title || '(без названия)';
            titleDisplay.addEventListener('click', () => openDetails(e.id));
            card.appendChild(titleDisplay);

            const header = document.createElement('div');
            header.className = 'card-header';
            const pill = document.createElement('span');
            pill.className = 'pill ' + (e.color === 'red' ? 'red' : e.color === 'green' ? 'green' : 'orange');
            pill.textContent = e.color === 'red' ? 'Красный' : e.color === 'green' ? 'Зелёный' : 'Оранжевый';
            const title = document.createElement('input');
            title.className = 'input';
            title.value = e.title;
            title.addEventListener('change', () => { updateEntry(e.id, { title: title.value }); titleDisplay.textContent = title.value || '(без названия)'; });

            const score = document.createElement('input');
            score.type = 'number'; score.step = '0.1'; score.value = String(e.score); score.className = 'input score-input';
            score.title = 'Оценка';
            score.addEventListener('change', () => updateEntry(e.id, { score: parseFloat(score.value || '0') || 0 }));

            const actions = document.createElement('div');
            actions.className = 'card-actions';
            const colorBtn = btn('Цвет', 'fa-palette', () => cycleColor(e));
            const addSpBtn = btn('Подпункт', 'fa-plus', () => addSubpoint(e.id, 'Свободный пункт', ''));
            const openBtn = btn('Открыть', 'fa-up-right-from-square', () => openDetails(e.id));
            const delBtn = btn('Удалить', 'fa-trash', () => removeEntry(e.id));
            actions.append(colorBtn, addSpBtn, openBtn, delBtn);

            header.append(pill, title, score, actions);
            card.appendChild(header);

            const subWrap = document.createElement('div');
            subWrap.className = 'subpoints';
            for(const sp of e.subpoints) subWrap.appendChild(renderSubpoint(e, sp));
            card.appendChild(subWrap);

            const meta = document.createElement('div');
            meta.className = 'muted';
            const dt = new Date(e.createdAt);
            meta.textContent = dt.toLocaleString();
            card.appendChild(meta);

            return card;
        }

        function renderSubpoint(entry, sp) {
            const el = document.createElement('div');
            el.className = 'subpoint';
            const label = document.createElement('input');
            label.className = 'input';
            label.placeholder = 'Название подпункта';
            label.value = sp.label;
            label.addEventListener('change', () => updateSubpoint(entry.id, sp.id, { label: label.value }));
            const remove = btn('', 'fa-times', () => removeSubpoint(entry.id, sp.id));
            remove.classList.add('mini');
            el.append(label, remove);
            return el;
        }

        function cycleColor(e) {
            const next = e.color === 'red' ? 'orange' : e.color === 'orange' ? 'green' : 'red';
            updateEntry(e.id, { color: next });
        }

        function btn(text, icon, handler) {
            const b = document.createElement('button');
            b.className = 'btn mini';
            b.innerHTML = icon ? `<i class="fas ${icon}"></i> ${text}` : text;
            b.addEventListener('click', handler);
            return b;
        }

        function defaultSubpoints() {
            return [
                { id: cryptoRandomId(), label: 'Из-за чего и почему случилось это', text: '' },
                { id: cryptoRandomId(), label: 'Как ты поступил (что сделал)', text: '' },
                { id: cryptoRandomId(), label: 'Как наилучшим образом следовало поступить', text: '' },
            ];
        }

        function cryptoRandomId() {
            if (window.crypto && crypto.getRandomValues) {
                const arr = new Uint32Array(4); crypto.getRandomValues(arr);
                return Array.from(arr).map(x => x.toString(16).padStart(8,'0')).join('');
            }
            return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if(!raw) return [];
                const arr = JSON.parse(raw);
                return Array.isArray(arr) ? arr : [];
            } catch(_) { return []; }
        }

        function openDetails(id) {
            location.href = 'fate-entry.html?id=' + encodeURIComponent(id);
        }

        render();
    })();
    </script>
</body>
</html>
